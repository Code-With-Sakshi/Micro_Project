<!DOCTYPE html>
<html>
<head>
    <title>Certificate Verification System</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: url("images/bg1.jpg") no-repeat center center/cover;
        }

        .overlay{
            position:absolute;
            width:100%;
            height:100%;
            background: rgba(0,0,0,0.6);
        }

        .top-title{
         position:absolute;
         top:40px;
         width:100%;
         text-align:center;
         color:white;
         z-index:2;
        }

    .top-title h1{
    font-size:40px;
    font-family: 'Times New Roman';
     }

        .container{
            position:relative;
            text-align:center;
            color:white;
            z-index:2;
        }

        h1{
            font-size:40px;
            margin-bottom:40px;
            letter-spacing:1px;
        }

        .btn{
            padding:15px 40px;
            margin:15px;
            font-size:18px;
            border:none;
            border-radius:30px;
            cursor:pointer;
            transition:0.3s;
        }

        .admin-btn{
            background:#ff9800;
            color:white;
        }

        .user-btn{
            background:#00bcd4;
            color:white;
        }

        .btn:hover{
            transform:scale(1.1);
            opacity:0.9;
        }

    </style>
</head>
<body>

<div class="overlay"></div>

<div class="top-title">
    <h1>AI-Driven Blockchain Certificate Detection System</h1>
</div>


<div class="container">
    <button class="btn admin-btn" onclick="goToAdmin()">
        Admin Portal
    </button>

    <button class="btn user-btn" onclick="goToUser()">
        User Portal
    </button>
</div>

<script>
function goToAdmin(){
    window.location.href = "admin_signup.html";
}

function goToUser(){
    window.location.href = "user_signup.html";
}
</script>

</body>
</html>
